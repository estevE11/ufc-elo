name: Update UFC data and site

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape new events
        run: python src/scrape_ufcstats.py --mode incremental --data-dir data

      - name: Update Elo ratings (incremental)
        run: python src/elo_engine.py --incremental

      - name: Export site stats (incremental)
        run: python src/export_static_site.py --incremental

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update UFC data and site stats"
            git push
          fi
