<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fighter Profile — UFC Elo</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">UFC <span>Elo</span></a>
      <a href="index.html" class="back-link">← Back to rankings</a>
    </div>
  </header>

  <main class="container" id="app">
    <div class="profile-header">
      <h1 id="fighter-name">Loading…</h1>
      <p id="fighter-meta" class="profile-meta"></p>
    </div>

    <section class="chart-section">
      <h2 id="chart-title">Ranking Over Time</h2>
      <div id="chart-filters" class="chart-filters"></div>
      <div class="chart-container">
        <canvas id="rank-chart"></canvas>
      </div>
    </section>

    <section class="fights-section">
      <h2>Fight History</h2>
      <div class="fights-table-wrap">
      <table class="fights-table">
        <thead>
          <tr>
            <th class="col-outcome"><span class="th-full">W/L</span></th>
            <th class="col-date">Date</th>
            <th class="col-div">Division</th>
            <th class="col-opp">Opponent</th>
            <th class="col-method">Method</th>
            <th class="col-p4p-delta">P4P Δ</th>
            <th class="col-p4p-elo">P4P Elo</th>
            <th class="col-div-delta">Div Δ</th>
            <th class="col-div-elo">Div Elo</th>
          </tr>
        </thead>
        <tbody id="fights-body">
          <tr><td colspan="9" class="loading">Loading fights…</td></tr>
        </tbody>
      </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      Custom Elo ratings from UFC fight history
    </div>
  </footer>

  <script type="module" src="js/fighter.js"></script>
</body>
</html>
