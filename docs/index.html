<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFC Elo Rankings</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">UFC <span>Elo</span></a>
      <span class="back-link">Data as of <span id="ref-date">—</span></span>
    </div>
  </header>

  <main class="container" id="app">
    <div class="controls">
      <div id="mode-toggle" class="mode-toggle" role="radiogroup" aria-label="Ranking mode">
        <span class="mode-toggle-thumb" aria-hidden="true"></span>
        <button type="button" class="mode-option active" data-mode="current" role="radio" aria-checked="true">Current</button>
        <button type="button" class="mode-option" data-mode="historical" role="radio" aria-checked="false">Historical</button>
      </div>
      <div class="search-box">
        <input type="search" id="fighter-search" placeholder="Search fighters…" autocomplete="off">
        <div id="search-results" class="search-results"></div>
      </div>
    </div>

    <p id="mode-subtitle" class="subtitle"></p>

    <section id="division-grid" class="division-grid" aria-label="Rankings by division">
      <div class="loading">Loading rankings…</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      Custom Elo ratings from UFC fight history · <a href="https://github.com/estevE11/ufc-elo">GitHub</a>
    </div>
  </footer>

  <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
